<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 660" width="100%" height="100%" style="background-color: #0c0f19; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <!-- Background Dot Grid Pattern -->
    <pattern id="dot-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e293b" fill-opacity="0.5" />
    </pattern>
    
    <!-- CSS Animations -->
    <style>
      /* Glowing animated flow paths */
      .flow-active {
        stroke-dasharray: 8, 12;
        animation: flow-anim 2s linear infinite;
      }
      @keyframes flow-anim {
        to {
          stroke-dashoffset: -20;
        }
      }

      /* Status dot breathing animation */
      .status-pulse-cyan {
        animation: pulse-cyan 1.6s infinite ease-in-out;
      }
      @keyframes pulse-cyan {
        0%, 100% { fill-opacity: 0.3; r: 3.5px; fill: #38bdf8; }
        50% { fill-opacity: 1; r: 5.5px; fill: #00f0ff; }
      }

      .status-pulse-green {
        animation: pulse-green 1.8s infinite ease-in-out;
      }
      @keyframes pulse-green {
        0%, 100% { fill-opacity: 0.4; r: 3.5px; }
        50% { fill-opacity: 1; r: 5.5px; }
      }

      /* BaseAgent pulse indicator */
      .active-pulse {
        animation: active-pulse-anim 1.5s infinite ease-in-out;
      }
      @keyframes active-pulse-anim {
        0%, 100% { opacity: 0.6; stroke-width: 1.5px; }
        50% { opacity: 1; stroke-width: 2.5px; stroke: #00ff88; }
      }

      /* Terminal Cursor Blinking */
      .cursor-blink {
        animation: cursor-blink-anim 1s step-end infinite;
      }
      @keyframes cursor-blink-anim {
        50% { opacity: 0; }
      }
    </style>

    <!-- Gradients for Connectors -->
    <linearGradient id="glow-grad-blue-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="glow-grad-purple-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    
    <!-- Gradients for Cards -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#475569" />
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#6366f1" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#10b981" />
    </marker>

    <!-- Card Shadow Filters -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Apply Grid -->
  <rect width="1050" height="660" fill="url(#dot-grid)" />

  <!-- Title (Matches Agentic Patterns image style) -->
  <text x="525" y="55" fill="#f8fafc" font-size="28" font-weight="700" letter-spacing="-0.5px" text-anchor="middle" font-family="monospace">Agentic Systems Core Framework</text>
  <text x="525" y="80" fill="#64748b" font-size="13" text-anchor="middle">Standardized core library orchestrating safe, observable, and budget-guarded multi-agent execution</text>

  <!-- ==================== CONNECTING PATHS (EDGES) ==================== -->
  
  <!-- Goal Ingestion -> Guardrails Input -->
  <path d="M 120 280 H 180" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Guardrails Input -> DAG Runner (Active Flow) -->
  <path d="M 330 280 H 380" fill="none" stroke="url(#glow-grad-blue-purple)" stroke-width="2.5" />
  <path d="M 330 280 H 380" fill="none" stroke="#38bdf8" stroke-width="2.5" class="flow-active" marker-end="url(#arrow-active)" />
  
  <!-- DAG Runner -> Researcher Agent (Fork Up - Active Flow) -->
  <path d="M 500 250 C 500 170, 520 160, 560 160" fill="none" stroke="url(#glow-grad-blue-purple)" stroke-width="2.5" />
  <path d="M 500 250 C 500 170, 520 160, 560 160" fill="none" stroke="#818cf8" stroke-width="2.5" class="flow-active" marker-end="url(#arrow-active)" />
  
  <!-- DAG Runner -> Coder Agent (Horizontal) -->
  <path d="M 510 280 H 560" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- DAG Runner -> Auditor Agent (Fork Down) -->
  <path d="M 500 310 C 500 390, 520 400, 560 400" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Researcher Agent -> Blackboard (State Store - Active Flow) -->
  <path d="M 700 160 C 740 160, 740 230, 770 230" fill="none" stroke="url(#glow-grad-purple-teal)" stroke-width="2.5" />
  <path d="M 700 160 C 740 160, 740 230, 770 230" fill="none" stroke="#c084fc" stroke-width="2.5" class="flow-active" marker-end="url(#arrow-active)" />
  
  <!-- Coder Agent -> Blackboard -->
  <path d="M 700 280 H 770" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Auditor Agent -> Blackboard -->
  <path d="M 700 400 C 740 400, 740 330, 770 330" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Blackboard -> BaseAgent Router (Active Flow) -->
  <path d="M 910 280 H 940" fill="none" stroke="url(#glow-grad-purple-teal)" stroke-width="2.5" />
  <path d="M 910 280 H 940" fill="none" stroke="#10b981" stroke-width="2.5" class="flow-active" marker-end="url(#arrow-green)" />

  <!-- Feedback loops to DAG Runner (For dynamic task dependency recalculation) -->
  <path d="M 840 350 C 840 470, 445 470, 445 340" fill="none" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="642" y="462" fill="#818cf8" fill-opacity="0.8" font-size="11" text-anchor="middle" font-family="monospace">State Change Sync &amp; Re-run Triggers</text>

  <!-- Observability Tracker connections -->
  <path d="M 445 220 V 500 C 445 520, 520 520, 540 530" fill="none" stroke="#64748b" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3" />
  <path d="M 840 220 V 500 C 840 520, 760 520, 740 530" fill="none" stroke="#64748b" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3" />

  <!-- ==================== NODES & CARDS ==================== -->

  <!-- Node 0: Goal Ingestion -->
  <g transform="translate(20, 225)" filter="url(#card-shadow)">
    <rect width="100" height="110" rx="8" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5" />
    <text x="50" y="45" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">Task / Goal</text>
    <text x="50" y="65" fill="#94a3b8" font-size="11" text-anchor="middle">Ingestion</text>
    <rect x="15" y="80" width="70" height="16" rx="3" fill="#020617" fill-opacity="0.5" />
    <text x="50" y="92" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">src/spec.json</text>
  </g>

  <!-- Node 1: Guardrails (Input Validator) -->
  <g transform="translate(180, 195)" filter="url(#card-shadow)">
    <rect width="150" height="170" rx="10" fill="url(#card-grad)" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.8" />
    <!-- Shield Icon -->
    <path d="M 75 35 L 95 43 V 70 C 95 85, 75 95, 75 95 C 75 95, 55 85, 55 70 V 43 Z" fill="none" stroke="#818cf8" stroke-width="2" />
    <path d="M 67 65 L 72 70 L 83 58" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <text x="75" y="112" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="middle">Guardrails</text>
    <text x="75" y="127" fill="#64748b" font-size="10" text-anchor="middle">src/core/Guardrails.js</text>
    
    <rect x="15" y="142" width="120" height="16" rx="3" fill="#020617" fill-opacity="0.5" />
    <text x="75" y="153" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">Input Sanitizer</text>
  </g>

  <!-- Node 2: DAG Runner Scheduler -->
  <g transform="translate(380, 195)" filter="url(#shadow)">
    <rect width="130" height="170" rx="10" fill="url(#card-grad)" stroke="#818cf8" stroke-width="1.5" />
    <!-- Graph Icon -->
    <circle cx="50" cy="50" r="4" fill="#a855f7" />
    <circle cx="80" cy="40" r="4" fill="#6366f1" />
    <circle cx="80" cy="65" r="4" fill="#6366f1" />
    <circle cx="65" cy="52" r="3" fill="#f43f5e" />
    <line x1="50" y1="50" x2="80" y2="40" stroke="#475569" stroke-width="1.5" />
    <line x1="50" y1="50" x2="80" y2="65" stroke="#475569" stroke-width="1.5" />
    <line x1="65" y1="52" x2="80" y2="40" stroke="#475569" stroke-width="1.5" />
    
    <text x="65" y="112" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="middle">DAG Runner</text>
    <text x="65" y="127" fill="#64748b" font-size="10" text-anchor="middle">src/core/DAGRunner.js</text>
    
    <rect x="15" y="142" width="100" height="16" rx="3" fill="#020617" fill-opacity="0.5" />
    <text x="65" y="153" fill="#a855f7" font-family="monospace" font-size="9" text-anchor="middle">Kahn's Sort</text>
  </g>

  <!-- ==================== MIDDLE AGENTS SECTION ==================== -->
  
  <!-- Researcher Agent Card -->
  <g transform="translate(560, 115)" filter="url(#shadow)">
    <rect width="140" height="90" rx="8" fill="url(#card-grad)" stroke="#38bdf8" stroke-width="1.5" />
    <circle cx="20" cy="22" r="4.5" fill="#38bdf8" class="status-pulse-cyan" />
    <text x="32" y="26" fill="#f8fafc" font-size="12" font-weight="600">Researcher</text>
    
    <rect x="12" y="42" width="116" height="38" rx="4" fill="#020617" fill-opacity="0.5" stroke="#1e293b" stroke-width="1" />
    <text x="20" y="54" fill="#94a3b8" font-size="9">In-degree: 0 (planner)</text>
    <text x="20" y="66" fill="#38bdf8" font-size="9">Task: Data Gathering</text>
    <text x="20" y="76" fill="#00ffcc" font-size="8" font-weight="600">Status: Running</text>
  </g>

  <!-- Coder Agent Card -->
  <g transform="translate(560, 235)" filter="url(#shadow)">
    <rect width="140" height="90" rx="8" fill="url(#card-grad)" stroke="#a855f7" stroke-width="1" />
    <circle cx="20" cy="22" r="4" fill="#a855f7" fill-opacity="0.5" />
    <text x="32" y="26" fill="#f8fafc" font-size="12" font-weight="600">Reviewer/Coder</text>
    
    <rect x="12" y="42" width="116" height="38" rx="4" fill="#020617" fill-opacity="0.5" stroke="#1e293b" stroke-width="1" />
    <text x="20" y="54" fill="#94a3b8" font-size="9">In-degree: 1 (research)</text>
    <text x="20" y="66" fill="#a855f7" font-size="9">Task: Code Review</text>
    <text x="20" y="76" fill="#64748b" font-size="8" font-weight="500">Status: Queued</text>
  </g>

  <!-- Auditor Agent Card -->
  <g transform="translate(560, 355)" filter="url(#shadow)">
    <rect width="140" height="90" rx="8" fill="url(#card-grad)" stroke="#475569" stroke-width="1" />
    <circle cx="20" cy="22" r="4" fill="#64748b" fill-opacity="0.5" />
    <text x="32" y="26" fill="#f8fafc" font-size="12" font-weight="600">Bug Triage</text>
    
    <rect x="12" y="42" width="116" height="38" rx="4" fill="#020617" fill-opacity="0.5" stroke="#1e293b" stroke-width="1" />
    <text x="20" y="54" fill="#94a3b8" font-size="9">In-degree: 2 (review)</text>
    <text x="20" y="66" fill="#94a3b8" font-size="9">Task: Routing Classifier</text>
    <text x="20" y="76" fill="#64748b" font-size="8" font-weight="500">Status: Standby</text>
  </g>

  <!-- ==================== BACKEND STATE & CLIENT ==================== -->

  <!-- Node 4: Blackboard (State Database & Budget Guard) -->
  <g transform="translate(770, 195)" filter="url(#shadow)">
    <rect width="140" height="170" rx="10" fill="url(#card-grad)" stroke="#f59e0b" stroke-width="1.5" />
    <!-- Database Icon -->
    <path d="M 70 40 C 90 40 90 48 70 48 C 50 48 50 40 70 40 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M 50 44 V 56 C 50 60 70 60 70 56 V 44" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M 90 44 V 56 C 90 60 70 60 70 56 V 44" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M 50 56 V 68 C 50 72 70 72 70 68 V 56" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M 90 56 V 68 C 90 72 70 72 70 68 V 56" fill="none" stroke="#f59e0b" stroke-width="1.5" />

    <text x="70" y="112" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="middle">Blackboard</text>
    <text x="70" y="127" fill="#64748b" font-size="10" text-anchor="middle">src/core/Blackboard.js</text>
    
    <rect x="15" y="142" width="110" height="16" rx="3" fill="#020617" fill-opacity="0.5" />
    <text x="70" y="153" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle">Budget Guard SQLite</text>
  </g>

  <!-- Node 5: BaseAgent (Multi-LLM Router) -->
  <g transform="translate(940, 225)" filter="url(#shadow)">
    <rect width="100" height="110" rx="8" fill="url(#card-grad)" stroke="#10b981" stroke-width="1.5" class="active-pulse" />
    <circle cx="20" cy="22" r="4.5" fill="#10b981" class="status-pulse-green" />
    <text x="32" y="26" fill="#f8fafc" font-size="12" font-weight="600">BaseAgent</text>
    <text x="50" y="65" fill="#94a3b8" font-size="10" text-anchor="middle">Router/Client</text>
    
    <rect x="10" y="80" width="80" height="16" rx="3" fill="#020617" fill-opacity="0.5" />
    <text x="50" y="92" fill="#10b981" font-family="monospace" font-size="9" text-anchor="middle">Ollama Fallback</text>
  </g>

  <!-- ==================== OBSERVABILITY & LOGS (BOTTOM PANEL) ==================== -->
  
  <g transform="translate(540, 500)" filter="url(#shadow)">
    <rect width="200" height="120" rx="10" fill="#0f172a" fill-opacity="0.95" stroke="#64748b" stroke-width="1.2" />
    <!-- Term Icon -->
    <rect x="15" y="15" width="22" height="16" rx="2" fill="none" stroke="#64748b" stroke-width="1.5" />
    <path d="M 19 23 L 23 23 M 24 23 L 27 23" fill="none" stroke="#64748b" stroke-width="1.5" />
    
    <text x="45" y="27" fill="#f8fafc" font-size="12" font-weight="600">Observability Engine</text>
    <text x="45" y="40" fill="#64748b" font-size="9">src/core/Observability.js</text>
    
    <!-- Code display block -->
    <rect x="15" y="52" width="170" height="52" rx="4" fill="#020617" fill-opacity="0.5" stroke="#1e293b" stroke-width="1" />
    
    <text x="25" y="67" fill="#818cf8" font-family="monospace" font-size="9">trace.id:</text>
    <text x="80" y="67" fill="#e2e8f0" font-family="monospace" font-size="9">"run-a35fd2..."</text>
    
    <text x="25" y="82" fill="#818cf8" font-family="monospace" font-size="9">api_cost:</text>
    <text x="80" y="82" fill="#10b981" font-family="monospace" font-size="9">"$0.00 (Ollama)"</text>

    <text x="25" y="97" fill="#818cf8" font-family="monospace" font-size="9">status:</text>
    <text x="80" y="97" fill="#10b981" font-family="monospace" font-size="9">"saved trace.json"<tspan fill="#00ff88" class="cursor-blink">|</tspan></text>
  </g>
</svg>
